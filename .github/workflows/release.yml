name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build and push by digest
        uses: michielvha/docker-release-action@v2
        with:
          matrix-mode: build
          version: ${{ github.ref_name }}
          registry: ghcr.io
          username: vhco-pro
          password: ${{ secrets.GITHUB_TOKEN }}
          project: stackweaver-zitadel-init
          platforms: ${{ matrix.platform }}
          context: .

  merge:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Create multi-arch manifest
        uses: michielvha/docker-release-action@v2
        with:
          matrix-mode: merge
          version: ${{ github.ref_name }}
          registry: ghcr.io
          username: vhco-pro
          password: ${{ secrets.GITHUB_TOKEN }}
          project: stackweaver-zitadel-init
          trivy-exit-code: '1'

  changelog:
    needs: merge
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Changelog & GitHub Release
        uses: michielvha/changelog-release-action@main
        with:
          version: ${{ github.ref_name }}
