name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions: {}

jobs:
  build:
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build and push by digest
        uses: michielvha/docker-release-action@01f1c91b9b79bca51b330b6a640ad6153277ff62 # v2 (supply-chain)
        with:
          matrix-mode: build
          version: ${{ github.ref_name }}
          registry: ghcr.io
          username: vhco-pro
          password: ${{ secrets.GITHUB_TOKEN }}
          project: stackweaver-zitadel-init
          platforms: ${{ matrix.platform }}
          context: .

  merge:
    needs: build
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - name: Create multi-arch manifest
        uses: michielvha/docker-release-action@01f1c91b9b79bca51b330b6a640ad6153277ff62 # v2 (supply-chain)
        with:
          matrix-mode: merge
          version: ${{ github.ref_name }}
          registry: ghcr.io
          username: vhco-pro
          password: ${{ secrets.GITHUB_TOKEN }}
          project: stackweaver-zitadel-init
          trivy-exit-code: '1'
          cosign-sign: 'true'
          sbom: 'true'
          attest-provenance: ${{ github.event.repository.visibility == 'public' }}
          attest-sbom: ${{ github.event.repository.visibility == 'public' }}

  changelog:
    needs: merge
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Changelog & GitHub Release
        uses: michielvha/changelog-release-action@81984f615bdcb8f88bbf92f49cae8d70f0fce099 # main snapshot 2026-05-23
        with:
          version: ${{ github.ref_name }}
